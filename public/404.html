<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تمام — لوحة التحكم</title>
    <script>
      // SPA fallback for GitHub Pages — redirect 404s back to index with hash
      const path = window.location.pathname;
      const base = '/tamam-dashborad';
      const route = path.replace(base, '') || '/';
      window.location.replace(base + '/?r=' + encodeURIComponent(route));
    </script>
  </head>
  <body></body>
</html>
